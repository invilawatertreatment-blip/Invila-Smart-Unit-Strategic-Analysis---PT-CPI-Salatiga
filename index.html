<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invila™ Strategic Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Destructure Lucide Icons dari objek global
        const { 
            Droplets, Waves, MapPin, Calendar, User, Activity, 
            ArrowUpRight, RefreshCw, ShieldCheck, Zap, Cpu, 
            TrendingDown, ChevronRight, Monitor 
        } = lucide;

        /** Hook Odometer Effect **/
        const useOdometer = (target, duration = 2000, trigger = true) => {
            const [count, setCount] = useState(0);
            const startTime = useRef(null);

            useEffect(() => {
                if (!trigger) {
                    setCount(0);
                    startTime.current = null;
                    return;
                }

                const animate = (timestamp) => {
                    if (!startTime.current) startTime.current = timestamp;
                    const progress = Math.min((timestamp - startTime.current) / duration, 1);
                    const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                    const currentCount = Math.floor(easeProgress * target);
                    setCount(currentCount);
                    if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }, [target, duration, trigger]);

            return count;
        };

        const formatIDN = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        /** Komponen Project Card **/
        const ProjectCard = ({ project, index, isVisible }) => {
            const animatedCap = useOdometer(project.capacity, 1500 + index * 100, isVisible);
            return (
                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-xl hover:border-blue-500 transition-all duration-300 group">
                    <div className="flex justify-between items-start mb-4">
                        <span className="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">{project.year}</span>
                        <div className="text-slate-300 group-hover:text-blue-500 transition-colors"><ArrowUpRight size={20} /></div>
                    </div>
                    <h3 className="text-lg font-bold text-slate-800 leading-snug mb-2 group-hover:text-blue-700 transition-colors">{project.name}</h3>
                    <div className="space-y-2 mb-6 text-slate-500 text-sm">
                        <div className="flex items-center"><MapPin size={14} className="mr-2" /> {project.location}</div>
                        <div className="flex items-center"><User size={14} className="mr-2" /> {project.client}</div>
                    </div>
                    <div className="pt-4 border-t border-slate-50">
                        <div className="flex items-end justify-between">
                            <div className="text-xs font-semibold text-slate-400 uppercase tracking-tighter">Kapasitas</div>
                            <div className="text-right">
                                <span className="text-2xl font-black text-blue-600">{formatIDN(animatedCap)}</span>
                                <span className="text-xs font-bold text-slate-400 ml-1">m³/bln</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /** App Dashboard Utama **/
        function App() {
            const [isVisible, setIsVisible] = useState(false);
            const [activePhase, setActivePhase] = useState(0);
            const financialChartRef = useRef(null);
            const scadaChartRef = useRef(null);
            const financialChartInstance = useRef(null);
            const scadaChartInstance = useRef(null);

            const baseUrl = "https://raw.githubusercontent.com/invilawatertreatment-blip/invila-odometer/main/";
            const logoUrl = `${baseUrl}invila-treatment-unit.png`;
            
            const clientLogos = ["tirtanadi.png", "kievit.png", "kiw.png", "petrokimia-gresik.png", "united-tractors.png", "patria-maritim-perkasa.png", "tirta-asasta-depok.png", "wika.png", "cemerlang-samudra-kontrindo.png"];

            const projects = [
                { id: 1, name: "Clarifier 6 PDAM Tirtanadi Sunggal", location: "Medan-Sunggal", year: "2013", client: "PDAM Tirtanadi", capacity: 1296000 },
                { id: 2, name: "Clarifier 1 PDAM Tirtanadi Sunggal", location: "Medan-Sunggal", year: "2014", client: "PDAM Tirtanadi", capacity: 1296000 },
                { id: 3, name: "WTP 300 LPS (Uprating Legong)", location: "Depok", year: "2016", client: "PDAM", capacity: 777600 },
                { id: 4, name: "WTP 300 LPS Citayam", location: "Jawa Barat", year: "2016", client: "PDAM", capacity: 777600 },
                { id: 5, name: "SPAM Gunung Sari Petro Kimia", location: "Surabaya", year: "2016", client: "PT Petro Kimia Gresik", capacity: 2160000 },
                { id: 6, name: "SPAM 50 LPS KIW", location: "Semarang", year: "2018", client: "Kawasan Industri Wijayakusuma", capacity: 12900 },
                { id: 7, name: "IPAL – IPA Salatiga Plant", location: "Salatiga", year: "2025", client: "PT Kievit Indonesia", capacity: 7800 },
                { id: 8, name: "SPAM UT – Patria Maritim", location: "Banjarmasin", year: "2025", client: "Dok Kapal Patria Maritim", capacity: 108000 },
                { id: 9, name: "Kawasan Industri Wijayakusuma (Unit Baru)", location: "Jawa Tengah", year: "2026", client: "Management Kawasan Industri", capacity: 64800 },
            ];

            const phases = [
                { id: 'p1', name: '1. AERO-PULSE', title: 'Optimalisasi Hidrolika, Invila Aero-Shocks', desc: 'Bayangkan lumpur di dalam air limbah itu seperti "balon udara kecil". Karena proses aerasi di Active Sludge (MBBR Tank) yang sangat kuat, lumpur terjebak oleh gelembung udara mikroskopis sehingga menjadi ringan dan mengapung di permukaan Tank Lamella Existing. Aero-Shock memberikan "hentakan" udara bertekanan selama 0,5 detik di jalur air masuk untuk melucuti gelembung (vortex mikro) tersebut. Begitu gelembungnya lepas, lumpur menjadi berat kembali secara alami dan langsung jatuh ke dasar tangki.', result: 'Penurunan potensi flok mengambang secara terukur.' },
                { id: 'p2', name: '2. ZERO-SALT DOSING', title: 'Pengikatan Non-Garam', desc: 'Injeksi polimer kationik organik untuk mengikat kotoran tanpa menambah beban garam (Klorida/TDS) ke dalam air. Strategi ini memastikan TDS tetap terjaga di bawah ambang batas tanpa menggunakan Reverse Osmosis.', result: 'TDS terkendali sesuai parameter dasar.' },
                { id: 'p3', name: '3. HYBRID LAMELLA', title: 'Pemisahan Fisik', desc: 'Invila™ Hybrid Lamella Clarifier merupakan unit high-rate sedimentation yang dirancang untuk kinerja efluen yang stabil pada lahan terbatas. Kinerja pengendapan dikendalikan secara langsung oleh geometri lamella dan hydraulic boundary conditions sehingga footprint 50% lebih hemat dibandingkan sistem konvensional.', result: 'Kekeruhan ditargetkan < 1 NTU.' },
                { id: 'p4', name: '4. Smart Aero-Carbon (SACF)', title: 'Pemolesan Parameter', desc: 'Adsorpsi polutan organik dan gas terlarut menggunakan media Karbon Aktif premium serta filtrasi Silica Sand. Tahap ini menyerap bau amis, warna, dan sisa bahan organik hingga COD < 20 mg/L untuk standar air higienis.', result: 'Menghilangkan potensi bau & warna organik.' },
                { id: 'p5', name: '5. STERILISASI & BLENDING', title: 'Penyelesaian Kualitas', desc: 'Injeksi klorin dosis presisi untuk membunuh bakteri (E. Coli = 0) dan pencampuran 10-15% air segar untuk mengunci TDS < 300 mg/L. Proses ini memastikan kepatuhan standar mutu pangan sesuai Permenkes No. 2 Tahun 2023.', result: 'Target Mutu: E. Coli 0 (Mutlak)' }
            ];

            const totalMonthly = 6500700;
            const totalYearly = 78008400;
            const animatedMonthly = useOdometer(totalMonthly, 2500, isVisible);
            const animatedYearly = useOdometer(totalYearly, 3000, isVisible);

            useEffect(() => {
                setTimeout(() => setIsVisible(true), 500);
            }, []);

            useEffect(() => {
                if (isVisible) {
                    if (financialChartInstance.current) financialChartInstance.current.destroy();
                    const finCtx = financialChartRef.current.getContext('2d');
                    financialChartInstance.current = new Chart(finCtx, {
                        type: 'line',
                        data: {
                            labels: Array.from({length: 12}, (_, i) => `Bln ${i+1}`),
                            datasets: [
                                { label: 'Baseline (PDAM)', data: Array.from({length: 12}, (_, i) => (i+1) * 30000 * 14600), borderColor: '#94a3b8', borderDash: [5, 5], fill: false, pointRadius: 0 },
                                { label: 'Proyeksi (Invila)', data: Array.from({length: 12}, (_, i) => (i+1) * 30000 * 5500), borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, borderWidth: 3 }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
                    });

                    if (scadaChartInstance.current) scadaChartInstance.current.destroy();
                    const scadaCtx = scadaChartRef.current.getContext('2d');
                    scadaChartInstance.current = new Chart(scadaCtx, {
                        type: 'line',
                        data: {
                            labels: Array.from({length: 20}, (_, i) => `T-${20-i}m`),
                            datasets: [{ data: Array.from({length: 20}, () => 275 + Math.random() * 15), borderColor: '#2dd4bf', backgroundColor: 'rgba(45, 212, 191, 0.1)', fill: true, tension: 0.4, pointRadius: 0 }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 200, max: 350 }, x: { display: false } } }
                    });
                }
            }, [isVisible]);

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 selection:bg-blue-100">
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl">I</div>
                                <div className="hidden sm:block">
                                    <h1 className="font-bold text-slate-800 leading-tight">Invila™ Smart Unit</h1>
                                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Strategic Dashboard</p>
                                </div>
                            </div>
                            <div className="flex gap-6 text-sm font-bold text-slate-600">
                                <a href="#optimasi" className="hover:text-blue-600">Optimasi</a>
                                <a href="#teknologi" className="hover:text-blue-600">Teknologi</a>
                                <a href="#populasi" className="hover:text-blue-600">Populasi</a>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8 space-y-20">
                        <section className="pt-10 flex flex-col md:flex-row md:items-end justify-between gap-8">
                            <div className="space-y-6">
                                <img src={logoUrl} alt="Invila Logo" className="h-16 w-auto object-contain" />
                                <h2 className="text-4xl md:text-5xl font-black text-slate-900 leading-tight">
                                    Analisis Strategis & <br/>
                                    <span className="text-blue-600 underline decoration-blue-200 underline-offset-8">Rekam Jejak Operasional</span>
                                </h2>
                                <p className="text-slate-500 max-w-2xl text-lg">
                                    Transformasi air limbah menjadi air produksi sesuai standar pangan (Permenkes No. 2 Tahun 2023) tanpa mengubah struktur aset eksisting.
                                </p>
                            </div>
                            <button onClick={() => { setIsVisible(false); setTimeout(()=>setIsVisible(true), 100); }} className="flex items-center gap-2 bg-white text-slate-700 font-bold px-6 py-3 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-all">
                                <RefreshCw size={18} /> Refresh Animasi
                            </button>
                        </section>

                        <section id="optimasi" className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 bg-white rounded-3xl p-8 border border-slate-200 shadow-sm">
                                <div className="flex items-center gap-2 mb-6"><TrendingDown className="text-blue-600" /><h3 className="font-black text-xl">Potensi Optimasi Biaya</h3></div>
                                <div className="h-64 md:h-80"><canvas ref={financialChartRef}></canvas></div>
                            </div>
                            <div className="bg-blue-600 rounded-3xl p-8 text-white flex flex-col justify-between shadow-xl">
                                <Zap size={40} className="opacity-50" />
                                <div>
                                    <p className="text-blue-200 font-bold text-sm uppercase">Efisiensi Tahunan</p>
                                    <h4 className="text-4xl font-black">Rp 3,276 Miliar</h4>
                                </div>
                                <div className="pt-6 border-t border-blue-500/50 mt-6 flex items-center gap-2 text-xs font-bold">
                                    <ShieldCheck size={16} /> ZERO CAPEX INVESTMENT
                                </div>
                            </div>
                        </section>

                        <section id="teknologi" className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-4 space-y-3">
                                <div className="flex items-center gap-2 mb-4"><Cpu className="text-blue-600" /><h3 className="font-black text-xl">Metodologi</h3></div>
                                {phases.map((phase, idx) => (
                                    <button key={phase.id} onClick={() => setActivePhase(idx)} className={`w-full text-left p-4 rounded-2xl transition-all border ${activePhase === idx ? 'bg-blue-600 text-white' : 'bg-white text-slate-600 border-slate-200'}`}>
                                        <div className="flex justify-between items-center text-xs font-bold uppercase">{phase.name} {activePhase === idx && <ChevronRight size={16} />}</div>
                                    </button>
                                ))}
                            </div>
                            <div className="lg:col-span-8 bg-white rounded-3xl p-8 border border-slate-200 shadow-sm min-h-[400px]">
                                <h4 className="text-2xl font-black text-slate-800 mb-4">{phases[activePhase].title}</h4>
                                <p className="text-slate-500 leading-relaxed mb-6">{phases[activePhase].desc}</p>
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-2">Target Mutu</p>
                                    <p className="font-bold text-blue-700">{phases[activePhase].result}</p>
                                </div>
                                <div className="mt-8 h-20 w-full"><canvas ref={scadaChartRef}></canvas></div>
                            </div>
                        </section>

                        <section id="populasi" className="space-y-10">
                            <div className="bg-slate-900 rounded-[2.5rem] p-12 text-white relative overflow-hidden shadow-2xl">
                                <div className="relative z-10 grid grid-cols-1 md:grid-cols-2 gap-12">
                                    <div>
                                        <p className="text-blue-400 font-bold text-xs uppercase mb-2">Kapasitas Bulanan</p>
                                        <div className="flex items-baseline gap-2"><span className="text-6xl font-black">{formatIDN(animatedMonthly)}</span><span className="text-2xl opacity-50 italic">m³</span></div>
                                    </div>
                                    <div className="md:border-l border-slate-800 md:pl-12">
                                        <p className="text-blue-400 font-bold text-xs uppercase mb-2">Kapasitas Tahunan</p>
                                        <div className="flex items-baseline gap-2"><span className="text-6xl font-black">{formatIDN(animatedYearly)}</span><span className="text-2xl opacity-50 italic">m³</span></div>
                                    </div>
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {projects.map((project, idx) => (
                                    <ProjectCard key={project.id} project={project} index={idx} isVisible={isVisible} />
                                ))}
                            </div>
                        </section>
                    </main>

                    <footer className="mt-20 py-16 bg-slate-900 text-center">
                        <p className="text-slate-500 text-[10px] uppercase font-bold tracking-[0.3em]">Powered by Invila Engineering Systems</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
